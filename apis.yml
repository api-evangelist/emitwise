aid: emitwise
name: Emitwise
description: >-
  Emitwise is a London-based carbon accounting and Scope 3 reporting platform
  that uses AI to help large enterprises measure, manage, and reduce their
  product carbon footprint (PCF) and supply-chain greenhouse-gas emissions.
  The platform ingests spend data, activity data, and supplier information,
  auto-classifies suppliers, and produces audit-ready emissions reporting
  aligned with the GHG Protocol (Scope 1, 2, and 3) and frameworks such as
  CDP and CSRD. The Emitwise developer API at api.emitwise.com exposes
  facilities, projects, activity-data files, schema metadata, and aggregated
  supplier emissions data so customers can integrate carbon accounting into
  procurement, ERP, and sustainability reporting systems. Access is granted
  per-customer through Emitwise CSMs; API keys are generated from the Company
  settings area of the dashboard. In July 2025, Emitwise was acquired by
  Green Project Technologies; the Emitwise platform and team are now part of
  Green Project's end-to-end decarbonization solutions, while the existing
  Emitwise developer portal and API endpoints remain live for customers.
